name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
  merge_group:
    types: [checks_requested]

jobs:
  freebsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - name: freebsd
            architecture: x86-64
            version: '15.0'
          - name: freebsd
            architecture: x86-64
            version: '14.3'
    steps:
      - uses: actions/checkout@v6

      - uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          run: |
            uname -a
            # Must remove sudo's secure_path setting, because it interferes
            # with running the tests using sudo
            sudo sed -i '' '/Defaults secure_path/d' /usr/local/etc/sudoers
            sudo kldload mqueuefs
            fetch https://sh.rustup.rs -o rustup.sh
            sh rustup.sh -y --profile=minimal --default-toolchain stable
            . $HOME/.cargo/env
            rustc -Vv
            rustup target add i686-unknown-freebsd
            rustup component add clippy
            cargo build --all-targets --all-features
            cargo doc --no-deps --all-features
            cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
            sudo -E cargo test --all-features
            rm -rf $CARGO_HOME/registry/index
