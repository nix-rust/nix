name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
  merge_group:
    types: [checks_requested]

jobs:
  freebsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: freebsd
            version: "14.3"
            aarch: x86_64
          - os: freebsd
            version: "15.0"
            aarch: x86_64
          - os: freebsd
            version: "15.0"
            arch: aarch64
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          usesh: true
      - name: Install dependencies
        shell: freebsd {0}
        run: |
          pkg install -y curl
          kldload mqueuefs
          fetch https://sh.rustup.rs -o rustup.sh
          sh rustup.sh -y --profile=minimal --default-toolchain stable
          . $HOME/.cargo/env
          rustc -vV
          rustup component add clippy
      - name: Build
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo build --all-targets --all-features
      - name: Test
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo test --all-targets --all-features
      - name: Clippy
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
      - name: Doc
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo doc --no-deps --all-features
      - name: Hack
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          mkdir -p $HOME/.cargo/bin; export PATH=$HOME/.cargo/bin:$PATH
          curl -LsSf https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-x86_64-unknown-freebsd.tar.gz | tar xzf - -C ~/.cargo/bin
          cargo hack check --each-feature
      - name: i686 Build
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          rustup target add i686-unknown-freebsd
          cargo build --target i686-unknown-freebsd --all-features --all-targets
      - name: i686 Test
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo test --all-targets --all-features --target i686-unknown-freebsd 
      - name: i686 Doc
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo doc --no-deps --all-features --target i686-unknown-freebsd 


  netbsd:
    runs-on: ubuntu-latest
    name: NetBSD
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/netbsd-vm@v1
        with:
          release: "10.1"
          usesh: true
      - name: Install dependencies
        shell: netbsd {0}
        run: |
          pkg_add curl
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - name: Build
        shell: netbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo build --all-targets --all-features
      - name: Test
        shell: netbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo test --all-targets --all-features
      - name: Clippy
        shell: netbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
      - name: Doc
        shell: netbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo doc --no-deps --all-features

  openbsd:
    runs-on: ubuntu-latest
    name: OpenBSD
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/openbsd-vm@v1
        with:
          release: "7.8"
          usesh: true
      - name: Install dependencies
        shell: openbsd {0}
        run: |
          pkg_add rust
          rustc -Vv
      - name: Build
        shell: openbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo build --all-targets --all-features
      - name: Test
        shell: openbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo test --all-targets --all-features
      - name: Doc
        shell: openbsd {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo doc --no-deps --all-features

  haiku:
    runs-on: ubuntu-latest
    name: Haiku
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/haiku-vm@v1
        with:
          release: "r1beta5"
          usesh: true
      - name: Install dependencies
        shell: haiku {0}
        run: |
          pkgman update
          pkgman install -y rust_bin
          rustc -Vv
      - name: Build
        shell: haiku {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo build --all-targets --all-features
      - name: Test
        shell: haiku {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo test --all-targets --all-features
      - name: Doc
        shell: haiku {0}
        run: |
          . $HOME/.cargo/env
          cd $GITHUB_WORKSPACE
          cargo doc --no-deps --all-features

