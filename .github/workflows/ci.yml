name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
  merge_group:
    types: [checks_requested]

permissions:
  contents: read 

env: 
  MSRV: 1.69.0
  RUSTFLAGS: -Dwarnings

jobs:
  freebsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - name: freebsd
            architecture: x86-64
            version: '14.4'

          - name: freebsd
            architecture: arm64
            version: '15.0'
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.os.name }}-${{ matrix.os.version}}/${{ matrix.os.architecture }}
        uses: cross-platform-actions/action@v1.0.0
        env:
          TARGET=x86_64-unknown-freebsd
        with:
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            uname -a
            kldload mqueuefs
            fetch https://sh.rustup.rs -o rustup.sh
            sh rustup.sh -y --profile=minimal --default-toolchain stable
            . $HOME/.cargo/env
            rustc -Vv
            rustup target add i686-unknown-freebsd
            rustup component add clippy
            cargo build --all-targets --all-features
            cargo doc --no-deps --all-features
            cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
            mkdir -p $HOME/.cargo/bin; export PATH=$HOME/.cargo/bin:$PATH
            curl -LsSf https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-${HOST:-$TARGET}.tar.gz | tar xzf - -C ~/.cargo/bin
            cargo hack check --each-feature
            cargo test --all-features
            cargo build --target i686-unknown-freebsd --all-features
            cargo doc --no-deps --target i686-unknown-freebsd --all-features
            cargo test --target i686-unknown-freebsd
            rm -rf $CARGO_HOME/registry/index

  netbsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - name: netbsd
            architecture: x86-64
            version: '10.1'
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.os.name }}-${{ matrix.os.version}}/${{ matrix.os.architecture }}
        uses: cross-platform-actions/action@v1.0.0
        env:
          TARGET=x86_64-unknown-netbsd
        with:
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            uname -a
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
            . $HOME/.cargo/env
            rustc -Vv
            cargo build --all-targets --all-features
            cargo doc --no-deps --all-features
            cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
            mkdir -p $HOME/.cargo/bin; export PATH=$HOME/.cargo/bin:$PATH
            curl -LsSf https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-${HOST:-$TARGET}.tar.gz | tar xzf - -C ~/.cargo/bin
            cargo hack check --each-feature
            cargo test --all-features
            rm -rf $CARGO_HOME/registry/index

  openbsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - name: openbsd
            architecture: x86-64
            version: '7.8'
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.os.name }}-${{ matrix.os.version}}/${{ matrix.os.architecture }}
        uses: cross-platform-actions/action@v1.0.0
        env:
          TARGET=x86_64-unknown-openbsd
        with:
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            uname -a
            pkg_add rust
            . $HOME/.cargo/env
            rustc -Vv
            cargo build --all-targets --all-features
            cargo doc --no-deps --all-features
            cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
            mkdir -p $HOME/.cargo/bin; export PATH=$HOME/.cargo/bin:$PATH
            curl -LsSf https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-${HOST:-$TARGET}.tar.gz | tar xzf - -C ~/.cargo/bin
            cargo hack check --each-feature
            cargo test --all-features
            rm -rf $CARGO_HOME/registry/index

  haiku:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - name: haiku
            architecture: x86-64
            version: 'r1beta5'
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.os.name }}-${{ matrix.os.version}}/${{ matrix.os.architecture }}
        uses: cross-platform-actions/action@v1.0.0
        env:
          TARGET=x86_64-unknown-haiku
        with:
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            uname -a
            pkgman refresh && pkgman install -y rust_bin
            . $HOME/.cargo/env
            rustc -Vv
            cargo build --all-targets --all-features
            cargo doc --no-deps --all-features
            cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
            mkdir -p $HOME/.cargo/bin; export PATH=$HOME/.cargo/bin:$PATH
            curl -LsSf https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-${HOST:-$TARGET}.tar.gz | tar xzf - -C ~/.cargo/bin
            cargo hack check --each-feature
            cargo test --all-features
            rm -rf $CARGO_HOME/registry/index

  omnios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - name: omnios
            architecture: x86-64
            version: 'r151056'
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.os.name }}-${{ matrix.os.version}}/${{ matrix.os.architecture }}
        uses: cross-platform-actions/action@v1.0.0
        env:
          TARGET=x86_64-unknown-illumos
        with:
          operating_system: ${{ matrix.os.name }}
          architecture: ${{ matrix.os.architecture }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            uname -a
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
            . $HOME/.cargo/env
            rustc -Vv
            cargo build --all-targets --all-features
            cargo doc --no-deps --all-features
            cargo clippy --all-targets --all-features -- -D warnings -A unknown-lints
            mkdir -p $HOME/.cargo/bin; export PATH=$HOME/.cargo/bin:$PATH
            curl -LsSf https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-${HOST:-$TARGET}.tar.gz | tar xzf - -C ~/.cargo/bin
            cargo hack check --each-feature
            cargo test --all-features
            rm -rf $CARGO_HOME/registry/index
